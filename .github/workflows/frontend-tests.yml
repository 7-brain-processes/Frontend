name: Frontend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/frontend-tests.yml'
      - 'src/**'
      - 'public/**'
      - 'cypress/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'nginx.conf'
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/frontend-tests.yml'
      - 'src/**'
      - 'public/**'
      - 'cypress/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'nginx.conf'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --watch=false